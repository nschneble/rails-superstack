---
detectors:
  # Services use a stateless class-method pattern via BaseService.
  # Reek flags the `call` method as UtilityFunction because it doesn't use
  # instance variables, but that's intentional. The state lives in the
  # constructor arguments.
  UtilityFunction:
    enabled: false

  # Services that orchestrate external API objects (e.g. Stripe) unavoidably
  # access many attributes on those objects. This isn't a design flaw.
  # These services literally exist to translate those APIs into domain logic.
  FeatureEnvy:
    enabled: false
