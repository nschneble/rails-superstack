---
detectors:
  # Helper modules expose view utility methods by Rails convention.
  # These methods are module-level and don't hold instance state, so Reek's
  # UtilityFunction flag is expected here.
  UtilityFunction:
    enabled: false

  # Form builders (e.g. CustomFormBuilder) access options and form object
  # attributes by design. Reek flags this as FeatureEnvy, but a form builder
  # that doesn't touch the form object would be useless.
  FeatureEnvy:
    enabled: false
