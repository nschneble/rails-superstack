---
IrresponsibleModule:
  # This isn't useful without full YARD coverage
  enabled: false
LongParameterList:
  max_params: 4
TooManyInstanceVariables:
  max_instance_variables: 6
TooManyMethods:
  max_methods: 12
TooManyStatements:
  max_statements: 8

# Paths excluded from all smell detection. These are DSL declarations and test
# infrastructure; not application logic
exclude_paths:
  - app/dashboards # SuperAdmin resources
  - app/helpers/simplecov # SimpleCov formatters

# Directory overrides. Subdirectory Reek files are ignored when Reek is invoked
# as a library via RubyCritic, so all directory-specific rules must live here
# to take effect in both contexts
directories:
  "app/services":
    UtilityFunction:
      # Services use a stateless class-method pattern, but Reek flags the
      # `call` method as UtilityFunction b/c it doesn't use instance variables
      enabled: false
    FeatureEnvy:
      # Services orchestrating external API objects (like Stripe) unavoidably
      # access many attributes on those objects
      enabled: false

  "app/controllers/concerns":
    UtilityFunction:
      # Concerns mix instance methods into controllers, so methods like
      # `authenticate_by_token` use the request context from their controller
      enabled: false
    FeatureEnvy:
      # Concerns access object attributes by design
      enabled: false

  "app/decorators":
    FeatureEnvy:
      # Decorators access object attributes by design. TO DECORATE THEM
      enabled: false

  "app/helpers":
    UtilityFunction:
      # Helper modules expose view utility methods by Rails convention
      enabled: false
    FeatureEnvy:
      # A form builder that doesn't touch the form object would be useless
      enabled: false

  "app/normalizers":
    UtilityFunction:
      # Normalizers are stateless transformation objects by design
      enabled: false

  "app/parsers":
    UtilityFunction:
      # Parsers are stateless transformation objects by design
      enabled: false
